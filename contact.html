<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — HostCert</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container inner">
      <a class="logo" href="index.html">
        <span class="logo-mark">HC</span>
        HostCert
      </a>
    </div>
  </header>

  <main class="form-page">
    <div class="container">
      <div class="form-card">
        <h1>Contact us</h1>
        <p style="color: var(--muted);">Questions about HostCert, your dashboard, or billing? We aim to reply within 48 hours.</p>
        <p style="margin: 1.5rem 0;"><strong>Email:</strong> <a data-support-email href="mailto:support@hostcert.co.uk">support@hostcert.co.uk</a></p>

        <form action="https://formsubmit.co/support@hostcert.co.uk" method="POST">
          <input type="hidden" name="_subject" value="HostCert contact form">
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_template" value="table">
          <input type="hidden" name="_next" value="https://hostcert.co.uk/thank-you.html">

          <div class="form-group">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <button class="btn btn-primary" type="submit">Send message</button>
        </form>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-links">
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
      <a href="index.html">Home</a>
    </div>
  </footer>
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
